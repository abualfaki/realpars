name: Dagster Cloud Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dagster_cloud_deploy:
    runs-on: ubuntu-latest
    env:
      DAGSTER_CLOUD_URL: ${{ secrets.DAGSTER_CLOUD_URL }}
      DAGSTER_CLOUD_API_TOKEN: ${{ secrets.DAGSTER_CLOUD_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install dagster-cloud

      - name: Deploy to Dagster Cloud (Serverless)
        uses: dagster-io/dagster-cloud-action/actions/serverless_prod_deploy@v0.1
        with:
          dagster_cloud_api_token: ${{ secrets.DAGSTER_CLOUD_API_TOKEN }}
          location_file: dagster_cloud.yaml
          organization_id: ${{ secrets.DAGSTER_CLOUD_ORGANIZATION_ID }}
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: Deploy Branch (PR Preview)
        uses: dagster-io/dagster-cloud-action/actions/serverless_branch_deploy@v0.1
        with:
          dagster_cloud_api_token: ${{ secrets.DAGSTER_CLOUD_API_TOKEN }}
          location_file: dagster_cloud.yaml
          organization_id: ${{ secrets.DAGSTER_CLOUD_ORGANIZATION_ID }}
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
