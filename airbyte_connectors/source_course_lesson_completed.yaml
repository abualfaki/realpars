version: 7.10.0

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - course_lesson_completed

streams:
  - type: DeclarativeStream
    name: course_lesson_completed
    retriever:
      type: SimpleRetriever
      paginator:
        type: DefaultPaginator
        page_token_option:
          type: RequestOption
          field_name: page
          inject_into: request_parameter
        pagination_strategy:
          type: PageIncrement
          page_size: 100
          start_from_page: 1
          inject_on_first_request: true
      requester:
        type: HttpRequester
        url: https://app.circle.so/data_api/v1/community_events
        http_method: GET
        authenticator:
          type: BearerAuthenticator
          api_token: "{{ config['api_token'] }}"
        error_handler:
          type: CompositeErrorHandler
          error_handlers:
            - type: DefaultErrorHandler
              response_filters:
                - type: HttpResponseFilter
                  action: RETRY
                  http_codes:
                    - 429
                    - 500
                    - 502
                    - 503
                    - 504
                  error_message: Rate limit or server error, retrying...
              backoff_strategies:
                - type: ExponentialBackoffStrategy
                  factor: 2
        request_parameters:
          sort: "{{ config.get('sort', 'oldest') }}"
          events: courses.lesson.completed
          to_date: "{{ stream_interval.end_time }}"
          per_page: "{{ config.get('per_page', 100) }}"
          created_at_gt: "{{ stream_interval.start_time }}"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - events
        transform_before_filtering: false
    primary_key: id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        required:
          - id
          - created_at
        properties:
          version:
            type:
              - string
              - "null"
          id:
            type: string
          name:
            type:
              - string
              - "null"
          payload:
            type:
              - object
              - "null"
            properties:
              space:
                type:
                  - object
                  - "null"
                properties:
                  type:
                    type:
                      - string
                      - "null"
                  id:
                    type:
                      - number
                      - "null"
                  name:
                    type:
                      - string
                      - "null"
                  slug:
                    type:
                      - string
                      - "null"
              lesson:
                type:
                  - object
                  - "null"
                properties:
                  type:
                    type:
                      - string
                      - "null"
                  id:
                    type:
                      - number
                      - "null"
              initiator:
                type:
                  - object
                  - "null"
                properties:
                  type:
                    type:
                      - string
                      - "null"
                  id:
                    type:
                      - number
                      - "null"
                  name:
                    type:
                      - string
                      - "null"
                  email:
                    type:
                      - string
                      - "null"
                  is_admin:
                    type:
                      - boolean
                      - "null"
                  last_name:
                    type:
                      - string
                      - "null"
                  first_name:
                    type:
                      - string
                      - "null"
                  public_uid:
                    type:
                      - string
                      - "null"
                  is_moderator:
                    type:
                      - boolean
                      - "null"
          created_at:
            type: string
          triggered_at:
            type:
              - string
              - "null"
        additionalProperties: true
    incremental_sync:
      type: DatetimeBasedCursor
      step: P1M
      cursor_field: created_at
      end_datetime:
        type: MinMaxDatetime
        datetime: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%S%z') }}"
        datetime_format: "%Y-%m-%dT%H:%M:%S%z"
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ config['start_date'] }}"
        datetime_format: "%Y-%m-%dT%H:%M:%S%z"
      datetime_format: "%Y-%m-%dT%H:%M:%S%z"
      cursor_granularity: PT1S
      cursor_datetime_formats:
        - "%Y-%m-%dT%H:%M:%S%z"
        - "%Y-%m-%dT%H:%M:%SZ"

spec:
  type: Spec
  connection_specification:
    type: object
    title: Circle.so Community Events Source Spec
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - api_token
      - start_date
    properties:
      sort:
        type: string
        description: Sort order for events
        enum:
          - latest
          - oldest
        order: 3
        title: Sort Order
        default: oldest
      per_page:
        type: integer
        description: "Number of records to fetch per page (default: 100, max: 100)"
        order: 2
        title: Records Per Page
        default: 100
        maximum: 100
        minimum: 1
      api_token:
        type: string
        description: Circle.so API authentication token
        order: 0
        title: API Token
        airbyte_secret: true
      start_date:
        type: string
        description: >-
          Start date for incremental sync (ISO 8601 format:
          YYYY-MM-DDTHH:MM:SS+00:00)
        order: 1
        title: Start Date
        pattern: >-
          ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}[+-][0-9]{2}:[0-9]{2}$
        examples:
          - "2024-01-01T00:00:00+00:00"
    additionalProperties: true

